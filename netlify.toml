[build]
  command = "npm run build"
  publish = "build"

# PROXY do backendu na Render
[[redirects]]
  from = "/api/*"
  to = "https://investigation-in-10-rooms.onrender.com/:splat"  # <- sprawdź URL!
  status = 200
  force = true

# SPA fallback (po proxy!)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
